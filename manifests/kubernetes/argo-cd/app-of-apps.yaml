################################################################################
# Argo CD App-of-Apps Pattern
#
# This is the "root" Application that manages all other Applications.
# Each child app is deployed in dependency order using sync waves.
#
# Sync Waves:
# - Apps in lower waves deploy and become healthy BEFORE higher waves start
# - Wave 0: Namespaces + RBAC (must exist before anything deploys into them)
# - Wave 1: Infrastructure (Karpenter, cert-manager, external-secrets)
# - Wave 2: Networking (NGINX ingress, service mesh if applicable)
# - Wave 3: Observability (Prometheus, Grafana, Loki)
# - Wave 4: Applications (business workloads)
#
# Why this ordering matters:
# - Karpenter must be running before workload apps deploy (otherwise no nodes)
# - NGINX must be ready before apps that need ingress
# - Monitoring should be up before apps so we catch deployment issues
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  # The root app itself doesn't need a sync wave
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cava-group/k8s-platform.git
    targetRevision: main
    path: kubernetes/argo-cd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true  # Auto-correct drift — critical for GitOps
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true  # Performance: don't re-apply unchanged resources

---
################################################################################
# Wave 0: Namespaces + RBAC
# Must deploy first — other apps need these namespaces to exist
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/cava-group/k8s-platform.git
    targetRevision: main
    path: kubernetes/base/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
################################################################################
# Wave 1: Karpenter (node autoscaler)
# Must be running before workload apps — otherwise pods stay Pending
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://public.ecr.aws
    chart: karpenter/karpenter
    targetRevision: 0.35.0
    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: cava-platform-prod
          interruptionQueue: cava-platform-prod-karpenter
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/cava-platform-prod-karpenter-controller
        # Tolerate system node taint — Karpenter runs on managed node group
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
        # Anti-affinity: spread Karpenter replicas across nodes
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
################################################################################
# Wave 1: External Secrets Operator
# Syncs AWS Secrets Manager → Kubernetes Secrets
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.13
    helm:
      releaseName: external-secrets
      values: |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/cava-platform-prod-external-secrets
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
################################################################################
# Wave 2: NGINX Ingress Controller
# They specifically use NGINX (mentioned in JD). Before apps that need routes.
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.10.0
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # NLB for layer 4 — faster than ALB for this use case
          service:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: external
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
              service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
          # Metrics for Grafana dashboards
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          # Run on system nodes
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
          # HPA for the ingress controller itself
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 10
            targetCPUUtilizationPercentage: 70
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
################################################################################
# Wave 3: Prometheus Stack (kube-prometheus-stack)
# Includes Prometheus + node-exporter + kube-state-metrics + Alertmanager
# Grafana is separate — see next app
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2
    helm:
      releaseName: prometheus
      values: |
        # Disable Grafana from this chart — we deploy it separately for more control
        grafana:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
                  storageClassName: gp3
            # Scrape Karpenter metrics
            additionalScrapeConfigs:
              - job_name: karpenter
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names: ["karpenter"]
                relabel_configs:
                  - source_labels: [__meta_kubernetes_endpoint_port_name]
                    regex: http-metrics
                    action: keep
        # Alert rules for platform health
        defaultRules:
          create: true
          rules:
            etcd: false  # EKS manages etcd
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Required for CRDs in kube-prometheus-stack

---
################################################################################
# Wave 3: Grafana
# Separate from prometheus-stack for independent lifecycle management
# CAVA wants: dashboards for dev/support team training (per JD)
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 7.3.7
    helm:
      releaseName: grafana
      values: |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/cava-platform-prod-grafana
        persistence:
          enabled: true
          size: 10Gi
          storageClassName: gp3
        # Auto-provision datasources
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
                isDefault: true
                access: proxy
              - name: Loki
                type: loki
                url: http://loki.monitoring:3100
                access: proxy
              - name: CloudWatch
                type: cloudwatch
                jsonData:
                  defaultRegion: us-east-1
                  authType: default
        # Dashboard providers — load dashboards from configmaps
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: platform
                orgId: 1
                folder: Platform
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/platform
        # Sidecar auto-discovers ConfigMaps with grafana_dashboard label
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            folder: /var/lib/grafana/dashboards/platform
        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - grafana.cava-platform.internal
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
################################################################################
# Wave 3: Loki (log aggregation)
# Completes the observability trifecta: metrics + logs + dashboards
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.3.4
    helm:
      releaseName: loki
      values: |
        # Simple scalable mode for pilot — upgrade to microservices for scale
        deploymentMode: SimpleScalable
        loki:
          auth_enabled: false
          storage:
            type: s3
          commonConfig:
            replication_factor: 1
        # Promtail for log collection
        promtail:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
################################################################################
# Wave 4: Karpenter NodePools (CRDs)
# After Karpenter controller is running, apply the NodePool configs
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/cava-group/k8s-platform.git
    targetRevision: main
    path: kubernetes/karpenter
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
