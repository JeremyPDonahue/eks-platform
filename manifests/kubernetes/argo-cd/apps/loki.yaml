################################################################################
# Wave 3: Loki (log aggregation)
# Completes the observability trifecta: metrics + logs + dashboards
################################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.3.4
    helm:
      releaseName: loki
      values: |
        # Simple scalable mode for pilot — upgrade to microservices for scale
        deploymentMode: SimpleScalable
        loki:
          auth_enabled: false
          storage:
            type: s3
          commonConfig:
            replication_factor: 1
        # Promtail for log collection
        promtail:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true